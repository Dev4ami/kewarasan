<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kewarasan">
<link rel="icon" type="image/png" href="/icon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<title>Masuk · Kewarasan</title>
<style>
  :root {
    --bg: #0f1117; --card: #171a23; --line: #262a36;
    --fg: #e6e8ee; --muted: #8b90a0; --accent: #6ee7b7; --danger: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 360px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 28px 24px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  p.sub { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input[type=password] {
    width: 100%; background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 12px; font: inherit; font-size: 15px;
  }
  input[type=password]:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; margin-top: 14px;
    background: var(--accent); color: #06251a; border: 0; font-weight: 600;
    border-radius: 10px; padding: 12px; cursor: pointer; font: inherit; font-size: 15px;
  }
  button:active { transform: translateY(1px); }
  .err {
    background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.35);
    color: var(--danger); padding: 10px 12px; border-radius: 10px;
    font-size: 13px; margin-bottom: 14px;
  }
  .logo { font-size: 34px; margin-bottom: 8px; }
</style>
</head>
<body>
<form class="card" method="post" action="/login">
  <div class="logo">🧠</div>
  <h1>Kewarasan</h1>
  <p class="sub">Masukin password buat lanjut ke dashboard.</p>
  <div class="err" id="err" hidden>Password salah, coba lagi 😬</div>
  <label for="password">Password</label>
  <input type="password" name="password" id="password" autocomplete="current-password" required autofocus>
  <button type="submit">Masuk</button>
</form>
<script>
  if (new URLSearchParams(location.search).has('err')) {
    document.getElementById('err').hidden = false;
  }
</script>
</body>
</html>
